spring:
   application:
      name: pulse-backend


   datasource:
    url: jdbc:postgresql://localhost:5432/pulsedb
    username: pulse_user
    password: pulse_pass
    driver-class-name: org.postgresql.Driver

   jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    spring:
   security:
    user:
      name: admin
      password: admin

server:
  port: 8080